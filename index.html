<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanju Abraham</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000008;
      color: #e8e8f0;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: #7eb8f7;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s ease, height 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 0 12px #7eb8f7, 0 0 24px rgba(126, 184, 247, 0.4);
    }

    .cursor-ring {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(126, 184, 247, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
    }

    /* Starfield canvas */
    #starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Nebula overlay */
    .nebula {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(72, 30, 120, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(20, 60, 130, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 60% 20%, rgba(120, 20, 80, 0.10) 0%, transparent 60%);
    }

    /* Main content */
    main {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 10vw;
    }

    .coords {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: rgba(126, 184, 247, 0.5);
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 300;
      font-size: clamp(3rem, 8vw, 7rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: #f0f0ff;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }

    h1 span {
      display: block;
      font-weight: 500;
      background: linear-gradient(135deg, #7eb8f7 0%, #a78bfa 50%, #f0abfc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 1rem;
      color: rgba(200, 200, 220, 0.6);
      font-weight: 300;
      letter-spacing: 0.05em;
      max-width: 400px;
      line-height: 1.7;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
    }

    .links {
      display: flex;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    .links a {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: rgba(126, 184, 247, 0.7);
      text-decoration: none;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      position: relative;
      transition: color 0.3s ease;
    }

    .links a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: linear-gradient(90deg, #7eb8f7, #a78bfa);
      transition: width 0.3s ease;
    }

    .links a:hover {
      color: #c4e0ff;
    }

    .links a:hover::after {
      width: 100%;
    }

    /* Floating particle dot */
    .signal {
      position: fixed;
      bottom: 2.5rem;
      left: 10vw;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 10;
      opacity: 0;
      animation: fadeUp 1s ease 1.8s forwards;
    }

    .signal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .signal-text {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: rgba(74, 222, 128, 0.6);
      letter-spacing: 0.15em;
    }

    /* Parallax orb */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 2;
      filter: blur(80px);
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(90, 40, 160, 0.25) 0%, transparent 70%);
      top: -100px;
      right: -100px;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(30, 80, 180, 0.20) 0%, transparent 70%);
      bottom: -80px;
      left: 30%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>

<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <canvas id="starfield"></canvas>
  <div class="nebula"></div>

  <div class="orb orb-1" id="orb1"></div>
  <div class="orb orb-2" id="orb2"></div>

  <main>
    <p class="coords">RA 17h 45m 40s · DEC −29° 00′ 28″ · SOL +8.6 LY</p>
    <h1>Sanju<span>Abraham</span></h1>
    <p class="tagline">Somewhere between the code and the cosmos. Exploring what's possible at the edge of things.</p>
    <nav class="links">
      <a href="https://github.com/sanjujosh" target="_blank">GitHub</a>
      <a href="mailto:sanju@abrahas.me">Contact</a>
    </nav>
  </main>

  <div class="signal">
    <div class="signal-dot"></div>
    <span class="signal-text">SIGNAL ACTIVE</span>
  </div>

  <script>
    // ── Starfield ──────────────────────────────────────────────────
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let W, H, stars = [];

    const NUM_STARS = 280;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function makeStar() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        alpha: Math.random() * 0.7 + 0.15,
        speed: Math.random() * 0.003 + 0.001,
        phase: Math.random() * Math.PI * 2,
        color: ['#ffffff', '#c8d8ff', '#ffd8c8', '#d8c8ff'][Math.floor(Math.random() * 4)]
      };
    }

    function initStars() {
      stars = Array.from({ length: NUM_STARS }, makeStar);
    }

    function drawStars(t) {
      ctx.clearRect(0, 0, W, H);
      for (const s of stars) {
        const a = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 1000 + s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.globalAlpha = a;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Shooting star
    let shootingStars = [];
    function maybeShoot() {
      if (Math.random() < 0.004) {
        shootingStars.push({
          x: Math.random() * W * 0.7,
          y: Math.random() * H * 0.5,
          len: Math.random() * 120 + 60,
          speed: Math.random() * 8 + 6,
          alpha: 1,
          angle: Math.PI / 6 + (Math.random() - 0.5) * 0.3
        });
      }
    }

    function drawShootingStars() {
      for (let i = shootingStars.length - 1; i >= 0; i--) {
        const s = shootingStars[i];
        const dx = Math.cos(s.angle) * s.len;
        const dy = Math.sin(s.angle) * s.len;
        const grad = ctx.createLinearGradient(s.x, s.y, s.x + dx, s.y + dy);
        grad.addColorStop(0, `rgba(255,255,255,0)`);
        grad.addColorStop(1, `rgba(200,220,255,${s.alpha})`);
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + dx, s.y + dy);
        ctx.strokeStyle = grad;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        s.x += Math.cos(s.angle) * s.speed;
        s.y += Math.sin(s.angle) * s.speed;
        s.alpha -= 0.02;
        if (s.alpha <= 0) shootingStars.splice(i, 1);
      }
    }

    function animate(t) {
      drawStars(t / 1000);
      maybeShoot();
      drawShootingStars();
      requestAnimationFrame(animate);
    }

    resize();
    initStars();
    window.addEventListener('resize', () => { resize(); initStars(); });
    requestAnimationFrame(animate);

    // ── Parallax orbs ──────────────────────────────────────────────
    const orb1 = document.getElementById('orb1');
    const orb2 = document.getElementById('orb2');

    window.addEventListener('mousemove', e => {
      const cx = e.clientX / W - 0.5;
      const cy = e.clientY / H - 0.5;
      orb1.style.transform = `translate(${cx * -30}px, ${cy * -20}px)`;
      orb2.style.transform = `translate(${cx * 20}px, ${cy * 15}px)`;
    });

    // ── Custom cursor ──────────────────────────────────────────────
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function moveCursor() {
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top = ry + 'px';
      requestAnimationFrame(moveCursor);
    }
    moveCursor();
  </script>
</body>

</html>
